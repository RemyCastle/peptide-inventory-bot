# UnicornFartzzBot on your existing Render account (separate from TyFit).
# Web service keeps a public health URL; bot long-polls Telegram inside the same process.
# Starter ≈ always-on (same tier idea as TyFit). Free sleeps after inactivity.
services:
  - type: web
    name: unicornfartzz-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OWNER_IDS
        sync: false
      - key: BRAND_NAME
        value: UnicornFartzzBot
      - key: DB_PATH
        value: /data/inventory.db
      - key: LOG_PATH
        value: /data/bot.log
    disk:
      name: unicornfartzz-data
      mountPath: /data
      sizeGB: 1
